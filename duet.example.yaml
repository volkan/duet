# Example config for duet — pass with `duet.py --config duet.example.yaml`.
# Two agents take turns. Each keeps its own session across turns.

cwd: ~/code/myrepo
max_turns: 10
sentinel: "<<<LGTM>>>"
per_turn_timeout: 900
runs_dir: runs
sandbox: workspace-write
permission_mode: acceptEdits
dry_run: false
# recap: false  # true = compact per-turn debug view (writes recap.md next to transcript.md)

# Optional reasoning effort for both agents:
# minimal | low | medium | high | xhigh | max
# Codex: max maps to xhigh. Claude: minimal maps to low.
# reasoning: high

# Optional: shell command that must exit 0 before a valid LGTM+rationale
# convergence proposal can count. Runs in the worktree when worktree mode has
# an effective worktree path; otherwise runs in cwd.
# verify_cmd: "make test"

# Codex-only fast mode: pin codex coder turns to low reasoning effort and
# concise reasoning summaries, regardless of the `reasoning:` key or any
# per-agent `reasoning_effort`. Role-scoped to codex:coder so it can't silently
# downgrade a codex:planner / codex:reviewer; duet warns and treats it as a
# no-op when no codex coder is present. Claude turns and non-coder codex
# agents are untouched. Useful when the planner (claude) is doing the deep
# thinking and codex just needs to apply edits quickly. Combine with
# `reasoning: high` for that split. To force fast on a non-coder codex role,
# set per-agent `reasoning_effort: low` instead.
# codex_fast: false

# Optional: where new git worktrees land when --worktree is on. Default is
# <runs_dir>/<run_id>/wt/, which is durable across reboots and OS temp-dir
# cleaners. Override to any directory you control; runs land at <root>/<run_id>/.
# Avoid /tmp on macOS/Linux for long-running duets — the OS may wipe it
# mid-run.
# worktree_root: ~/duet-worktrees

# Optional: skip the kickoff stage by giving an explicit first message.
# kickoff: "Implement the plan we agreed on; write tests; run them."

# Optional: a generic task; only used if neither agent has a session_id and
# no kickoff is provided.
# Use @file or @- here too, or run an upstream tool and use its stdout:
# task_from_cmd: "claude -p /review"
task: |
  Refactor the auth module to use JWTs.
  Keep backward compatibility; add tests.

agents:
  - name: claude-lead
    backend: claude
    role: planner
    # session_id: 106c1c57-ca42-473f-b2f1-1ea764f78c46   # paste from prior `claude` session
    # model: claude-sonnet-4-6

  - name: codex-partner
    backend: codex
    role: coder
    # model: gpt-5
    # Codex 0.128+ with --sandbox workspace-write defaults to approval=never.
    # If your version still prompts, prepend "--full-auto" (older builds) or
    # "--yolo" (community alias) to extra_args.
    #
    # `sandbox_workspace_write.network_access=true` opts into outbound network
    # from inside codex's sandbox (it's blocked by default). Most useful tasks
    # need it — `gh`, `curl`, `npm install`, `pip install`, anything that
    # reaches a remote service. Remove the entry to keep strict isolation.
    extra_args: ["-c", "sandbox_workspace_write.network_access=true"]
    # role_prompt: |
    #   You are a senior engineer. Be terse. Apply edits. Run tests.
    #   When done, include an LGTM rationale and {SENTINEL} on its own line.

# Same-backend variants:
#
# Codex planner + Codex coder. Prefer worktree mode so one Codex peer gets a
# separate cwd; without cwd isolation, both peers must emit session UUIDs on
# their first turns or duet aborts before using the cwd-based --last fallback.
# worktree: true
# agents:
#   - name: codex-lead
#     backend: codex
#     role: planner
#   - name: codex-partner
#     backend: codex
#     role: coder
#
# Claude coder + Claude reviewer. Reviewer prompts tell Claude to inspect
# actual files, diffs, and test output instead of relying only on summaries.
# agents:
#   - name: claude-lead
#     backend: claude
#     role: coder
#   - name: claude-partner
#     backend: claude
#     role: reviewer
