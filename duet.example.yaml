# Example config for duet — pass with `duet.py --config duet.example.yaml`.
# Two agents take turns. Each keeps its own session across turns.

cwd: ~/code/myrepo
max_turns: 10
sentinel: "<<<LGTM>>>"
per_turn_timeout: 900
runs_dir: runs
sandbox: workspace-write
permission_mode: acceptEdits
dry_run: false
# recap: false  # true = compact per-turn debug view (writes recap.md next to transcript.md)

# Optional: where new git worktrees land when --worktree is on. Default is
# <runs_dir>/<run_id>/wt/, which is durable across reboots and OS temp-dir
# cleaners. Override to any directory you control; runs land at <root>/<run_id>/.
# Avoid /tmp on macOS/Linux for long-running duets — the OS may wipe it
# mid-run.
# worktree_root: ~/duet-worktrees

# Optional: skip the kickoff stage by giving an explicit first message.
# kickoff: "Implement the plan we agreed on; write tests; run them."

# Optional: a generic task; only used if neither agent has a session_id and
# no kickoff is provided.
# Use @file or @- here too, or run an upstream tool and use its stdout:
# task_from_cmd: "claude -p /review"
task: |
  Refactor the auth module to use JWTs.
  Keep backward compatibility; add tests.

agents:
  - name: claude-lead
    backend: claude
    role: planner
    # session_id: 106c1c57-ca42-473f-b2f1-1ea764f78c46   # paste from prior `claude` session
    # model: claude-sonnet-4-6

  - name: codex-partner
    backend: codex
    role: coder
    # model: gpt-5
    # Codex 0.128+ with --sandbox workspace-write defaults to approval=never.
    # If your version still prompts, prepend "--full-auto" (older builds) or
    # "--yolo" (community alias) to extra_args.
    #
    # `sandbox_workspace_write.network_access=true` opts into outbound network
    # from inside codex's sandbox (it's blocked by default). Most useful tasks
    # need it — `gh`, `curl`, `npm install`, `pip install`, anything that
    # reaches a remote service. Remove the entry to keep strict isolation.
    extra_args: ["-c", "sandbox_workspace_write.network_access=true"]
    # role_prompt: |
    #   You are a senior engineer. Be terse. Apply edits. Run tests.
    #   Emit {SENTINEL} on its own line when done.
