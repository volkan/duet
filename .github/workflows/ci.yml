name: ci

# This is the required merge-gate workflow. Every job here should pass before a
# PR merges (configure them as required status checks in branch protection — see
# .github/BRANCH_PROTECTION.md). The schedule/manual real-loop canary is separate
# and must not become a required PR check. Admins can still force-merge.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # duet targets Python 3.9+. Pin the floor, a mid, and a recent release.
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure git identity (smoke touches git)
        run: |
          git config --global user.email "ci@duet.invalid"
          git config --global user.name "duet ci"
      - name: Syntax check (py_compile, stdlib-only)
        run: python -m py_compile duet.py scripts/check_complexity.py scripts/check_distribution_metadata.py scripts/check_installed_wheel.py scripts/check_reasoning_levels.py
      - name: Unit tests
        run: make unit-test
      - name: Reasoning-level mapping check
        run: python scripts/check_reasoning_levels.py
      - name: Smoke tests (dry-run regression suite)
        run: make smoke-test

  distribution:
    name: distribution metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Source metadata and manifest validation
        run: make distribution-check
      - name: Install build frontend
        run: python -m pip install build
      - name: Build sdist/wheel and validate artifacts
        run: make package-check
  plugin:
    name: plugin validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.177
      - name: Validate Claude Code plugin
        run: make plugin-check

  complexity:
    name: complexity gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Cyclomatic-complexity / function-length gate
        run: make complexity
