# Re-score the candidate harness repos using `gh` as the primary source,
# include duet in the matrix, write DECISION_v2.md.
#
# Run from ~/workspace/agent2agent/duet/:
#   ./duet.py --config examples/repo-compare.yaml
#
# Prereqs:
#   - gh installed and authenticated (`gh auth status` should be green)
#   - claude + codex on PATH and authenticated
#   - You're inside the agent2agent folder so REQUIREMENTS.md and the
#     existing DECISION.md are reachable (the task tells codex to read
#     them via paths relative to ../).
#
# What happens:
#   1. claude-planner (lead) reads ../REQUIREMENTS.md and ../DECISION.md,
#      decides batching strategy (3 repos per codex turn to keep context
#      sane), and tells codex the next batch.
#   2. codex-researcher (partner, runs in a worktree) executes a strict
#      gh recipe per repo: `gh repo view --json` for metadata,
#      `gh api repos/<owner>/<repo>/readme` for the README, optionally
#      `gh repo clone` if deeper inspection is needed. Returns one fenced
#      JSON block per repo with: owner, repo, stars, forks, license,
#      pushedAt, language, h1..h8, s1..s9, evidence{} (per-cell quotes).
#   3. claude-planner accumulates scores into a markdown matrix and
#      requests the next batch. After all repos, it writes:
#        - ../DECISION_v2.md   — markdown report (matrix + delta + reco)
#        - ../DECISION_v2.html — visual dashboard with winner card, score
#          bars, and the same matrix as a sortable table. Self-contained
#          (inline SVG + CSS, no external CDNs).
#      Then emits <<<LGTM>>> on its own line.
#
# Output: ../DECISION_v2.md and ../DECISION_v2.html — open the HTML in
#         a browser to see the dashboard with the recommended winner.

cwd: .                            # the duet/ folder

# Claude's --add-dir defaults to cwd only. This task writes ../DECISION_v2.md
# and reads ../REQUIREMENTS.md / ../DECISION.md, so we explicitly grant the
# parent. Without this, claude refuses paths outside cwd and the run
# deadlocks with the planner unable to write the deliverables.
add_dirs:
  - ..

max_turns: 14                     # ~7 batches of 3 repos + synthesis turns
sentinel: "<<<LGTM>>>"
per_turn_timeout: 1800            # 30 min/turn (gh + claude synthesis can be heavy)
runs_dir: runs
sandbox: workspace-write
permission_mode: acceptEdits

worktree: true
worktree_for: partner             # codex clones repos inside its worktree
reasoning: high                   # both sides; codex gets -c model_reasoning_effort=high,
                                  # claude gets --effort high plus a prompt nudge

task: |
  Goal: produce TWO deliverables comparing agent-to-agent harness candidates,
  scored against ../REQUIREMENTS.md using `gh` as the PRIMARY source (real
  stars, license, last commit, full README), with duet included:

    1. ../DECISION_v2.md   — markdown report (matrix + delta + recommendation)
    2. ../DECISION_v2.html — single-file dashboard you can open in a browser:
                             winner hero card, score bars per repo, the
                             matrix as a sortable table, color-coded cells.

  ## Inputs the lead must read first

  - ../REQUIREMENTS.md  — the rubric (H1–H8 hard, S1–S9 soft)
  - ../DECISION.md      — current WebSearch-snippet-based matrix (what we want
    to verify / replace).
  - ../duet/duet.py     — duet's own implementation (for self-scoring)
  - ../duet/README.md   — duet's docs

  ## Repos to investigate (12 total, including duet self-score)

  1. AlessioZazzarini/claude-codex-collab
  2. SethGammon/Citadel
  3. awslabs/cli-agent-orchestrator
  4. HERMESquant/oh-my-hermes
  5. kingbootoshi/codex-orchestrator
  6. Chachamaru127/claude-code-harness
  7. caomyer/claude-code-a2a-multiagent
  8. yigitkonur/cli-continues
  9. iannuttall/ralph
  10. njbrake/agent-of-empires
  11. smtg-ai/claude-squad
  12. duet (this repo, scored by reading local files)

  ## Mandatory gh recipe (the partner MUST use exactly these calls)

  For each repo OWNER/REPO:

    gh repo view OWNER/REPO --json description,stargazerCount,forkCount,licenseInfo,pushedAt,primaryLanguage,defaultBranchRef
    gh api repos/OWNER/REPO/readme --jq '.content' | base64 -d > /tmp/readme.md
    head -300 /tmp/readme.md

  If the README references a config or main entry-point file, also:

    gh api repos/OWNER/REPO/contents/<path> --jq '.content' | base64 -d | head -200

  Do NOT skip this recipe and rely on memory or web search — primary sources only.

  ## Scoring rubric

  For each repo, score every requirement (H1–H8, S1–S9) as one of:
    ✅ (1.0)  clearly meets, evidence quoted from README/code
    🟡 (0.5)  partial / configurable / present but limited
    ❌ (0.0)  doesn't meet
    ❓ (0.0)  couldn't verify even with primary sources

  Always quote 1–2 lines of evidence from the README or code per H-grade
  cell. ❓ is OK if the evidence is genuinely absent — don't guess.

  ## Process

  - Lead (claude-planner) batches repos in groups of 3 and asks codex for
    the next batch. Lead also decides which repo to start with (suggest:
    HERMESquant/oh-my-hermes, awslabs/cli-agent-orchestrator,
    AlessioZazzarini/claude-codex-collab — the three I called out as most
    structurally similar to duet). For duet itself, lead asks codex to
    grep duet.py for the relevant features and self-score honestly.
  - Partner (codex-researcher) returns one fenced JSON block per repo with
    fields: owner, repo, stars, forks, license, pushedAt, language,
    h1..h8, s1..s9, evidence (object: requirement_code -> short quote).
  - Lead accumulates into a running matrix (paste each round's progress
    into the transcript so the run is debuggable).
  - After all 12 repos, lead writes ../DECISION_v2.md with three sections:
      1. Final matrix (markdown table, with a /17 total column).
      2. Delta vs DECISION.md (which cells flipped, with one-line reason).
      3. Recommendation (keep duet / switch / hybrid) — must be consistent
         with the new evidence, not the old.
  - Lead ALSO writes ../DECISION_v2.html — see "HTML deliverable" below.
  - Lead then emits <<<LGTM>>> on its own line.

  ## HTML deliverable (../DECISION_v2.html)

  A single self-contained file (no external CDNs, no JS frameworks) that a
  human can open in a browser to grok the comparison at a glance. Required
  sections, in order:

    1. **Winner card** at the top:
       - Repo name (owner/repo) as a heading
       - Total score (e.g. "14.5 / 17")
       - One-sentence rationale (the same recommendation logic from the
         markdown's section 3)
       - Quick-fact strip: stars, license, last push, language

    2. **Score-bars chart** — one horizontal bar per repo, sorted by total
       score descending. Each bar split visually into hard (H1–H8) vs
       soft (S1–S9) segments so you can see WHICH side of the score
       dominates. Bars done in inline SVG (no Chart.js / D3 / external
       libs). Width proportional to /17. The winner row gets a subtle
       highlight (border or background tint).

    3. **Full matrix table**:
       - Rows = repos (sorted same as the bar chart)
       - Columns = h1..h8, s1..s9, total
       - Cell content = the emoji (✅/🟡/❌/❓) plus tooltip with the
         evidence quote (use HTML `title=""` attribute for the tooltip;
         no JS needed).
       - Color-coded cell backgrounds: green / yellow / red / grey.
       - The header row should make columns clickable for sort (a tiny
         inline `<script>` of plain JS is OK if needed; keep it under
         ~30 lines and embedded in the file).

    4. **Delta section** — a compact list of "cells that flipped vs
       DECISION.md", each as one line: `OWNER/REPO H3: ✅ → 🟡 (reason)`.

    5. Footer with the run's date and a link back to ../DECISION_v2.md.

  Style: clean, readable, dark-mode friendly via `prefers-color-scheme`.
  Embed all CSS in a `<style>` block at the top. No `<link>` to remote
  stylesheets, no `<script src="...">` to remote JS. The file must work
  fully offline — that's the test.

  ## Failure modes to handle

  - Repo gone / renamed: mark all cells ❓, note in the matrix.
  - gh rate limit (HTTP 403): backoff with `sleep 60` and retry once; if
    still failing, mark the affected fields ❓ and continue.
  - README too short / missing: try /tmp/readme.md, then try
    `gh repo clone` to a temp dir and read the actual file.
  - License field null: don't guess — mark S6 as ❓ unless you can find
    LICENSE in the contents listing.
  - "error connecting to api.github.com" on EVERY gh call: codex's
    sandbox is blocking outbound network. The `extra_args` below should
    already opt in via `-c sandbox_workspace_write.network_access=true`;
    if it's still failing, the partner should STOP, report the symptom
    to the lead, and the run should be aborted (Ctrl-C) — no point
    filling the matrix with ❓.

  ## Out of scope (do NOT do these)

  - Don't clone every repo — only those whose README is too thin to score.
  - Don't run any of the candidate harnesses — just read.
  - Don't edit DECISION.md (the original); write the new one as
    ../DECISION_v2.md.

agents:
  - name: claude-planner
    backend: claude
    role: planner

  - name: codex-researcher
    backend: codex
    role: coder
    # extra_args build order — append more flags to the list below if needed:
    #
    # 1. `-c sandbox_workspace_write.network_access=true` — REQUIRED here.
    #    `gh` needs api.github.com; codex's workspace-write sandbox blocks
    #    outbound network by default (security default). Removing this entry
    #    will make every gh call fail with
    #    "error connecting to api.github.com". See
    #    `[sandbox_workspace_write] network_access` in openai/codex.
    #
    # 2. `--full-auto` or `--yolo` — only for older codex builds that still
    #    prompt for approval despite --sandbox workspace-write. Codex 0.128+
    #    defaults to approval=never; nothing to add for current builds.
    extra_args: ["-c", "sandbox_workspace_write.network_access=true"]
    role_prompt: |
      You are a research data-gatherer. Use ONLY `gh` CLI for repo
      metadata and READMEs. Return one fenced JSON block per repo with
      the schema requested by the planner: {owner, repo, stars, forks,
      license, pushedAt, language, h1..h8, s1..s9, evidence{...}}.
      Quote 1–2 lines of README/code evidence per H-grade cell.
      No prose between JSON blocks unless asked. Do NOT propose code
      changes. When the planner says you're done with a batch, end your
      reply with the JSON blocks only. Emit {SENTINEL} only if the
      planner explicitly tells you the run is complete.
